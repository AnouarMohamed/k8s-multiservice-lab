apiVersion: v1
kind: LimitRange
metadata:
  name: stg-defaults
  labels:
    app.kubernetes.io/part-of: k8s-multiservice-lab
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 250m
        memory: 256Mi
      max:
        cpu: 750m
        memory: 512Mi
