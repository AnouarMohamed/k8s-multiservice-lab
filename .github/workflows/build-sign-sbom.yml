name: build-sign-sbom

on:
  push:
    branches:
      - main
    paths:
      - "app/**"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_TAG_SHA: "ghcr.io/anouarmohamed/flask-api:${{ github.sha }}"
  IMAGE_TAG_STG: "ghcr.io/anouarmohamed/flask-api:stg"

jobs:
  build-sign-sbom:
    name: Build, sign, and attest flask-api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push flask-api image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_TAG_SHA }}
            ${{ env.IMAGE_TAG_STG }}

      - name: Install Syft
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/syft"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh |
            sh -s -- -b "$RUNNER_TEMP/syft"
          echo "$RUNNER_TEMP/syft" >> "$GITHUB_PATH"

      - name: Generate SBOM
        run: syft "$IMAGE_TAG_SHA" -o spdx-json > sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image tags
        run: |
          set -euo pipefail
          # This lab signs pushed tags so Kyverno can match the references below.
          # Production practice is to sign immutable image digests instead.
          cosign sign --yes "$IMAGE_TAG_SHA"
          cosign sign --yes "$IMAGE_TAG_STG"

      - name: Attach SBOM attestation
        run: |
          set -euo pipefail
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMAGE_TAG_SHA"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMAGE_TAG_STG"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: flask-api-sbom-spdx-json
          path: sbom.spdx.json
          if-no-files-found: error
