name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate app and Kubernetes manifests
    runs-on: ubuntu-latest
    env:
      KUBECONFORM_VERSION: "0.6.7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements-dev.txt
          python -m pip install yamllint

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        run: |
          set -euo pipefail
          url="https://github.com/yannh/kubeconform/releases/download"
          curl -fsSL "${url}/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" |
            tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Lint YAML
        run: yamllint .

      - name: Run unit tests
        run: PYTHONPATH=app pytest app/tests

      - name: Build container image
        run: docker build -t flask-api:stg ./app

      - name: Render staging overlay
        run: kubectl kustomize k8s/overlays/staging > rendered.yaml

      - name: Validate Kubernetes schemas
        run: kubeconform -strict -summary -ignore-missing-schemas rendered.yaml

      - name: Client dry-run
        run: kubectl apply --dry-run=client -f rendered.yaml
